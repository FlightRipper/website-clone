<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Style - Simple Practice</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header class="top-bar">
      <div class="logo">NIKE</div>

      <nav class="menu">
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
        <a href="#">Jordan</a>
        <a href="#">Sport</a>
      </nav>

      <div class="search">Search</div>
    </header>

    <main class="hero-grid">
      <div class="tile orange"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile green"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile blue"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile yellow"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile cyan"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile red"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile mint"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile sky"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile purple"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile sea"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile sand"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile rose"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile dark"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile deep"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile glow"><img src="images/mousa.png" alt="jersey"></div>
      <div class="tile cool"><img src="images/mousa.png" alt="jersey"></div>

      <section class="overlay-text">
        <h1>SEASON STARTS NOW</h1>
        <p>Your league, your look. Rep your team with new kits.</p>
        <button>Shop Now</button>
      </section>
    </main>
  </body>

</html>
